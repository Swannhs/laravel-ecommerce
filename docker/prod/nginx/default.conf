# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name manaraelectric.xyz www.manaraelectric.xyz;

    location / {
        return 301 https://$host$request_uri;
    }
    
    # Let's Encrypt verification path
    location ~ /\.(?!well-known).* {
        deny all;
    }
}

# HTTPS Server block
server {
    listen 443 ssl;
    http2 on;
    server_name manaraelectric.xyz www.manaraelectric.xyz;

    root /var/www/html/public;
    index index.php index.html;

    charset utf-8;
    client_max_body_size 64m;

    # SSL Configuration
    ssl_certificate /etc/letsencrypt/live/manaraelectric.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/manaraelectric.xyz/privkey.pem;
    
    # Recommended SSL security settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/html/public/index.php;
        fastcgi_param DOCUMENT_ROOT /var/www/html/public;
        fastcgi_index index.php;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}

